services:
  claude-code:
    image: node:26-slim
    env_file:
      - .env
    working_dir: /workspace
    volumes:
      - ${HOST_WORKDIR:?HOST_WORKDIR must be set in .env or the environment}:/workspace
      - claude_config:/home/node/.claude
      - npm_global:/usr/local/lib/node_modules
      - apt_cache:/var/cache/apt
      - gradle_cache:/home/node/.gradle
      - m2_repo:/home/node/.m2
      - android_sdk:/opt/android-sdk
      - ./entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/entrypoint.sh"]
    stdin_open: true
    tty: true

volumes:
  claude_config:
  npm_global:
  apt_cache:
  gradle_cache:
  m2_repo:
  android_sdk:
